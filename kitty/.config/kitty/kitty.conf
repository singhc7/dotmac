# Fonts
font_size        15
bold_font        auto
italic_font      auto
bold_italic_font auto

# Symbol / emoji fallback (Nerd Font symbols, then Apple emoji)
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b5,U+e700-U+e7c5,U+ed00-U+efc1,U+f000-U+f2ff,U+f300-U+f372,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

# ---nnn---
# Allow other programs (like nnn) to control Kitty
allow_remote_control yes

# Create a socket for nnn to communicate with Kitty
listen_on unix:/tmp/kitty

# Ensure the 'splits' layout is enabled so nnn can open side-by-side panes.
# 'stack' added so Cmd+Shift+Enter can zoom the current pane.
enabled_layouts splits,stack

# --- Tab bar ---
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template " {index}: {title} "
active_tab_font_style bold

# --- Scrollback ---
scrollback_lines 10000
scrollback_pager_history_size 100
scrollback_fill_enlarged_window yes
scrollback_pager nvim -u NONE -c "set nonumber nolist showtabline=0 foldcolumn=0 laststatus=0 signcolumn=no" -c "autocmd TermOpen * normal G" -c "map q :qa!<CR>" -c "silent write! /tmp/kitty_scrollback" -c "term cat /tmp/kitty_scrollback"

# --- Clipboard ---
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask

# --- URL handling ---
url_style curly
open_url_with default
detect_urls yes
show_hyperlink_targets yes

# --- Window ---
window_padding_width 4
confirm_os_window_close -1
hide_window_decorations titlebar-only

# --- macOS ---
# Left Option behaves as Alt (for Alt+C, Alt+F, vim/tmux Meta-bindings).
# Right Option still types special characters (©, ™, é, …).
macos_option_as_alt left

# --- Keybindings (Mac-native, splits layout) ---
# Pane splits — Cmd+D / Cmd+Shift+D mirror iTerm2 muscle memory
map cmd+d            launch --location=vsplit --cwd=current
map cmd+shift+d      launch --location=hsplit --cwd=current

# Cycle / zoom panes. Vim-style nav is handled by tmux; Cmd+H is kept free
# for macOS "Hide app".
map cmd+]            next_window
map cmd+[            previous_window
map cmd+shift+enter  toggle_layout stack

# Forward Cmd+Arrows as readline line-nav (works in zsh & most TUIs)
map cmd+left         send_text all \x01
map cmd+right        send_text all \x05
map cmd+backspace    send_text all \x15

# BEGIN_KITTY_THEME
# Adwaita darker
include current-theme.conf
# END_KITTY_THEME
